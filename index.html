<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A* vs Dijkstra</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">Demo de busqueda</p>
          <h1>A* vs Dijkstra</h1>
        </div>
        <div class="formula">f = g + h</div>
      </header>

      <section class="stage">
        <article class="map-card">
          <div class="map-head">
            <div>
              <p id="modeLabel">Comparacion final</p>
              <h2 id="modeTitle">Misma ruta optima, menos nodos con A*</h2>
            </div>
            <div class="route-tags">
              <span><i class="line-sample astar"></i>A*</span>
              <span><i class="line-sample dijkstra"></i>Dijkstra</span>
            </div>
          </div>

          <div class="map-wrap">
            <svg id="metroMap" viewBox="0 0 900 560" role="img" aria-labelledby="mapTitle mapDesc">
              <title id="mapTitle">Comparacion visual de A estrella y Dijkstra</title>
              <desc id="mapDesc">Mapa tipo metro con nodos explorados y ruta final.</desc>

              <defs>
                <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#15202b" flood-opacity="0.18" />
                </filter>
                <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
                  <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#5edb39" flood-opacity="0.75" />
                </filter>
                <filter id="glowYellow" x="-30%" y="-30%" width="160%" height="160%">
                  <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#ffc400" flood-opacity="0.7" />
                </filter>
                <marker id="arrowAstar" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
                  <path d="M0,0 L0,8 L9,4 z" fill="#58d13c" />
                </marker>
                <marker id="arrowDijkstra" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
                  <path d="M0,0 L0,8 L9,4 z" fill="#ffbf00" />
                </marker>
              </defs>

              <path class="line line-light" d="M92 124 H160 Q215 124 215 179 V440 Q215 500 275 500 H405" />
              <path class="line line-dark" d="M78 392 H720 Q790 392 790 322 V126 Q790 82 746 82 H600" />
              <path class="line line-gray" d="M76 206 H216 Q278 206 278 268 V291 Q278 334 321 334 H456 Q506 334 506 284 Q506 246 544 246 H842" />

              <g id="exploreLayer"></g>
              <g id="routeLayer"></g>
              <g id="stationLayer"></g>
              <g id="valueLayer"></g>
            </svg>
          </div>
        </article>

        <aside class="side">
          <div class="controls" aria-label="Modo de visualizacion">
            <button class="mode-button active" data-mode="compare" type="button">Comparar</button>
            <button class="mode-button" data-mode="astar" type="button">A*</button>
            <button class="mode-button" data-mode="dijkstra" type="button">Dijkstra</button>
            <button class="play-button" id="playDemo" type="button">Animar</button>
          </div>

          <div class="score-grid">
            <div class="score-card dijkstra">
              <span>Dijkstra</span>
              <strong id="dijkstraCount">18</strong>
              <small>nodos explorados</small>
            </div>
            <div class="score-card astar">
              <span>A*</span>
              <strong id="astarCount">8</strong>
              <small>nodos explorados</small>
            </div>
          </div>

          <div class="values-card">
            <h3>Valores iniciales</h3>
            <div class="value-row">
              <span>Ruta A</span>
              <b>g=1 · h=4 · f=5</b>
            </div>
            <div class="value-row">
              <span>Ruta B</span>
              <b>g=2 · h=3 · f=5</b>
            </div>
          </div>

          <div class="mini-legend">
            <span><i class="dot start"></i>Inicio</span>
            <span><i class="dot goal"></i>Destino</span>
            <span><i class="dot transfer"></i>Transbordo</span>
            <span><i class="dot explored-a"></i>A*</span>
            <span><i class="dot explored-d"></i>Dijkstra</span>
          </div>
        </aside>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
